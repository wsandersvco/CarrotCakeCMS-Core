name: Veracode Multi-Module Scan

on:
  pull_request:
    branches: ['**']

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diagnose git state
        run: |
          echo "Current branch/HEAD:"
          git rev-parse --abbrev-ref HEAD
          echo "HEAD commit:"
          git rev-parse HEAD
          echo "origin/master commit:"
          git rev-parse origin/master
          echo ""
          echo "Git diff output:"
          git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "DIFF FAILED"

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} 2>/dev/null || true

      - name: Detect changed modules
        id: detect
        run: |
          # Get all changed files from base to PR branch
          if CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null); then
            echo "Using base branch diff"
          elif CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD 2>/dev/null); then
            echo "Using fallback diff (HEAD~1...HEAD)"
          else
            echo "::warning::Could not determine changed files"
            CHANGED_FILES=""
          fi

          # Extract unique top-level folder names
          MODULES=$(echo "$CHANGED_FILES" | cut -d'/' -f1 | sort -u | grep -v '^$')

          # DIAGNOSTIC: Check what was extracted
          echo "Extracted modules: '$MODULES'"

          # DIAGNOSTIC: For each module, check .csproj existence
          while IFS= read -r MODULE; do
            echo "Checking $MODULE:"
            find "$MODULE" -maxdepth 1 -name "*.csproj" -ls 2>&1 | head -5 || echo "  find failed"
            ls -la "$MODULE"/ 2>&1 | head -10 || echo "  ls failed"
          done <<< "$MODULES"

          # Filter to only folders containing .csproj files
          FILTERED_MODULES=()
          while IFS= read -r MODULE; do
            if find "$MODULE" -maxdepth 1 -name "*.csproj" -print -quit 2>/dev/null | grep -q .; then
              FILTERED_MODULES+=("$MODULE")
            fi
          done <<< "$MODULES"

          # Convert to JSON array
          if [ ${#FILTERED_MODULES[@]} -eq 0 ]; then
            MODULES_JSON="[]"
          else
            MODULES_JSON=$(printf '%s\n' "${FILTERED_MODULES[@]}" | jq -R . | jq -c -s .)
          fi

          echo "DEBUG: MODULES_JSON = '$MODULES_JSON'"
          echo "DEBUG: Length = ${#MODULES_JSON}"

          echo "modules=$MODULES_JSON" >> $GITHUB_OUTPUT
          echo "Changed modules: $MODULES_JSON"

  package-modules:
    name: Package Modules
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    # NOTE: When adding modules to the strategy matrix, ensure corresponding zip_files_MODULENAME outputs are added below
    outputs:
      zip_files_CMSCore: ${{ steps.zip-files.outputs.zip_files_CMSCore }}
      zip_files_CMSAdmin: ${{ steps.zip-files.outputs.zip_files_CMSAdmin }}
      zip_files_CMSSecurity: ${{ steps.zip-files.outputs.zip_files_CMSSecurity }}
      zip_files_CMSComponents: ${{ steps.zip-files.outputs.zip_files_CMSComponents }}
      zip_files_CMSInterfaces: ${{ steps.zip-files.outputs.zip_files_CMSInterfaces }}
      zip_files_CMSData: ${{ steps.zip-files.outputs.zip_files_CMSData }}
      zip_files_WebComponents: ${{ steps.zip-files.outputs.zip_files_WebComponents }}
      zip_files_Northwind: ${{ steps.zip-files.outputs.zip_files_Northwind }}
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Veracode CLI
        run: |
          set -e
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          ./veracode version || exit 1

      - name: Package module with Veracode
        run: |
          set -e
          ./veracode package \
            -s "${{ matrix.module }}" \
            -a \
            -o "veraout/${{ matrix.module }}" \
            -t directory

      - name: Output ZIP file list
        id: zip-files
        run: |
          ZIP_FILES=$(find "veraout/${{ matrix.module }}/" -type f \( -name "*.zip" -o -name "*.tar.gz" \) -printf '%f\n' | jq -c -Rs 'split("\n") | map(select(length > 0))')
          echo "zip_files_${{ matrix.module }}=$ZIP_FILES" >> $GITHUB_OUTPUT

      - name: Upload packaged module artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-${{ matrix.module }}
          path: veraout/${{ matrix.module }}/
          retention-days: 1

  combine-zips:
    name: Combine ZIP Files
    needs: [ package-modules, detect-changes ]
    runs-on: ubuntu-latest
    outputs:
      all_zips: ${{ steps.combine.outputs.all_zips }}
    steps:
      - name: Combine ZIP files from all modules
        id: combine
        run: |
          # Array to hold all ZIP paths
          declare -a ALL_ZIPS

          # Process each module and its ZIP files
          MODULES='${{ needs.detect-changes.outputs.modules }}'

          for MODULE in $(echo "$MODULES" | jq -r '.[]'); do
            # Get the ZIP files output for this module
            ZIP_FILES_KEY="zip_files_${MODULE}"
            ZIP_FILES=$(eval "echo \${{ needs.package-modules.outputs.$ZIP_FILES_KEY }}")

            if [ -z "$ZIP_FILES" ] || [ "$ZIP_FILES" = "null" ]; then
              echo "::warning::No ZIPs found for module $MODULE"
              continue
            fi

            # Add each ZIP with its full path
            for ZIP in $(echo "$ZIP_FILES" | jq -r '.[]'); do
              ALL_ZIPS+=("veraout/$MODULE/$ZIP")
            done
          done

          # Convert to JSON array
          if [ ${#ALL_ZIPS[@]} -eq 0 ]; then
            ALL_ZIPS_JSON="[]"
          else
            ALL_ZIPS_JSON=$(printf '%s\n' "${ALL_ZIPS[@]}" | jq -R . | jq -c -s .)
          fi

          echo "Combined ZIPs: $ALL_ZIPS_JSON"
          echo "all_zips=$ALL_ZIPS_JSON" >> $GITHUB_OUTPUT

  veracode-scan:
    name: Veracode Pipeline Scan
    needs: [ package-modules, detect-changes, combine-zips ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zip_file: ${{ fromJson(needs.combine-zips.outputs.all_zips) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract module from ZIP path
        id: extract-module
        run: |
          # Extract module name from zip_file (e.g., "veraout/CMSCore/app.zip" -> "CMSCore")
          MODULE=$(echo '${{ matrix.zip_file }}' | cut -d'/' -f2)
          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "Extracted module: $MODULE from ${{ matrix.zip_file }}"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: veracode-${{ steps.extract-module.outputs.module }}
          path: veraout/${{ steps.extract-module.outputs.module }}/

      - name: Verify ZIP file exists
        run: |
          if [ ! -f "${{ matrix.zip_file }}" ]; then
            echo "::error::ZIP file not found: ${{ matrix.zip_file }}"
            ls -la veraout/${{ steps.extract-module.outputs.module }}/ || echo "Directory does not exist"
            exit 1
          fi
          echo "Verified ZIP file: ${{ matrix.zip_file }}"
          ls -lh "${{ matrix.zip_file }}"

      - name: Run Veracode Pipeline Scan
        uses: veracode/Veracode-pipeline-scan-action@esd-true
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: ${{ matrix.zip_file }}
          fail_on_severity: critical
          fail_build: true
