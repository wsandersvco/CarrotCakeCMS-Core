name: Veracode Multi-Module Scan

on:
  pull_request:
    branches: ['**']

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diagnose git state
        run: |
          echo "Current branch/HEAD:"
          git rev-parse --abbrev-ref HEAD
          echo "HEAD commit:"
          git rev-parse HEAD
          echo "origin/master commit:"
          git rev-parse origin/master
          echo ""
          echo "Git diff output:"
          git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "DIFF FAILED"

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} 2>/dev/null || true

      - name: Detect changed modules
        id: detect
        run: |
          # Get all changed files from base to PR branch
          if CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null); then
            echo "Using base branch diff"
          elif CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD 2>/dev/null); then
            echo "Using fallback diff (HEAD~1...HEAD)"
          else
            echo "::warning::Could not determine changed files"
            CHANGED_FILES=""
          fi

          # Extract unique top-level folder names
          MODULES=$(echo "$CHANGED_FILES" | cut -d'/' -f1 | sort -u | grep -v '^$')

          # DIAGNOSTIC: Check what was extracted
          echo "Extracted modules: '$MODULES'"

          # DIAGNOSTIC: For each module, check .csproj existence
          while IFS= read -r MODULE; do
            echo "Checking $MODULE:"
            find "$MODULE" -maxdepth 1 -name "*.csproj" -ls 2>&1 | head -5 || echo "  find failed"
            ls -la "$MODULE"/ 2>&1 | head -10 || echo "  ls failed"
          done <<< "$MODULES"

          # Filter to only folders containing .csproj files
          FILTERED_MODULES=()
          while IFS= read -r MODULE; do
            if find "$MODULE" -maxdepth 1 -name "*.csproj" -print -quit 2>/dev/null | grep -q .; then
              FILTERED_MODULES+=("$MODULE")
            fi
          done <<< "$MODULES"

          # Convert to JSON array
          if [ ${#FILTERED_MODULES[@]} -eq 0 ]; then
            MODULES_JSON="[]"
          else
            MODULES_JSON=$(printf '%s\n' "${FILTERED_MODULES[@]}" | jq -R . | jq -s .)
          fi

          echo "modules=$MODULES_JSON" >> $GITHUB_OUTPUT
          echo "Changed modules: $MODULES_JSON"

  package-modules:
    name: Package Modules
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Veracode CLI
        run: |
          set -e
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          ./veracode version || exit 1

      - name: Package module with Veracode
        run: |
          set -e
          ./veracode package \
            -s "${{ matrix.module }}" \
            -a \
            -o "veraout/${{ matrix.module }}" \
            -t directory

      - name: Upload packaged module artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-${{ matrix.module }}
          path: veraout/${{ matrix.module }}/
          retention-days: 1

  veracode-scan:
    name: Veracode Pipeline Scan
    needs: [ package-modules, detect-changes ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: veracode-${{ matrix.module }}
          path: veraout/${{ matrix.module }}/

      - name: List downloaded artifacts
        run: |
          echo "Artifacts for ${{ matrix.module }}:"
          find veraout/${{ matrix.module }}/ -type f \( -name "*.zip" -o -name "*.tar.gz" \)

      - name: Install Veracode CLI
        run: |
          set -e
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh

      - name: Submit packages to Veracode pipeline scan
        run: |
          set -e
          ZIPS=$(find veraout/${{ matrix.module }}/ -type f \( -name "*.zip" -o -name "*.tar.gz" \))

          if [ -z "$ZIPS" ]; then
            echo "No scan packages found for ${{ matrix.module }}"
            exit 1
          fi

          # Submit ZIPs with controlled concurrency (max 3 parallel)
          MAX_PARALLEL=3
          PIDS=()
          FAILED=0
          SUBMITTED=0
          SUCCEEDED=0

          for ZIP in $ZIPS; do
            # Wait if we've reached max parallel jobs
            while [ ${#PIDS[@]} -ge $MAX_PARALLEL ]; do
              for i in "${!PIDS[@]}"; do
                if ! kill -0 "${PIDS[$i]}" 2>/dev/null; then
                  wait "${PIDS[$i]}"
                  if [ $? -ne 0 ]; then
                    FAILED=$((FAILED + 1))
                  else
                    SUCCEEDED=$((SUCCEEDED + 1))
                  fi
                  unset 'PIDS[$i]'
                fi
              done
              PIDS=("${PIDS[@]}")  # Reindex array
            done

            echo "Submitting $ZIP to Veracode ($(($SUBMITTED + 1)) of $(echo "$ZIPS" | wc -l))..."
            SUBMITTED=$((SUBMITTED + 1))

            # Submit with 10 minute timeout
            timeout 600 ./veracode scan \
              --vid "${{ secrets.VERACODE_API_ID }}" \
              --vkey "${{ secrets.VERACODE_API_KEY }}" \
              --file "$ZIP" \
              --fail-on-severity "critical" \
              --fail-build true 2>&1 | sed "s/^/[$ZIP] /" &
            PIDS+=($!)
          done

          # Wait for all remaining submissions
          for PID in "${PIDS[@]}"; do
            wait $PID
            if [ $? -ne 0 ]; then
              FAILED=$((FAILED + 1))
            else
              SUCCEEDED=$((SUCCEEDED + 1))
            fi
          done

          echo "Scan results: $SUCCEEDED succeeded, $FAILED failed out of $SUBMITTED total"

          if [ $FAILED -gt 0 ]; then
            echo "One or more scans failed"
            exit 1
          fi
