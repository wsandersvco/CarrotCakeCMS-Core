default:
    runs_on: "windows-latest"
packager:
    projects:
        CarrotCakeCMS-Core/CMSAdmin:
            project_root: CarrotCakeCMS-Core/CMSAdmin
            packager_manager_type: dotnet
            root_build_file: CarrotCakeCMS-Core/CMSAdmin/CMSAdminCore.csproj
            packager_manager_version: net8.0
        CarrotCakeCMS-Core/Northwind:
            project_root: CarrotCakeCMS-Core/Northwind
            packager_manager_type: dotnet
            root_build_file: CarrotCakeCMS-Core/Northwind/Northwind.csproj
            packager_manager_version: net8.0
